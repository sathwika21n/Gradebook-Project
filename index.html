<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gradebook</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        .add-class-section {
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            margin-bottom: 30px;
        }

        .add-class-section h2 {
            color: #333;
            margin-bottom: 20px;
            font-size: 1.5em;
        }

        .input-group {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .input-group input {
            flex: 1;
            padding: 12px 15px;
            border: 2px solid #ddd;
            border-radius: 5px;
            font-size: 1em;
            transition: border-color 0.3s;
        }

        .input-group input:focus {
            outline: none;
            border-color: #667eea;
        }

        .btn {
            padding: 12px 25px;
            border: none;
            border-radius: 5px;
            font-size: 1em;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: bold;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .btn-secondary {
            background: #f0f0f0;
            color: #333;
        }

        .btn-secondary:hover {
            background: #e0e0e0;
        }

        .btn-danger {
            background: #ff6b6b;
            color: white;
            padding: 8px 15px;
            font-size: 0.9em;
        }

        .btn-danger:hover {
            background: #ee5a52;
        }

        .classes-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 20px;
        }

        .class-card {
            background: white;
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        }

        .class-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            border-bottom: 3px solid #667eea;
            padding-bottom: 15px;
        }

        .class-name {
            font-size: 1.3em;
            font-weight: bold;
            color: #333;
        }

        .class-average {
            font-size: 1.2em;
            font-weight: bold;
            padding: 8px 15px;
            border-radius: 5px;
            color: white;
        }

        .grades-list {
            margin-bottom: 20px;
            max-height: 300px;
            overflow-y: auto;
        }

        .grade-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 15px;
            margin-bottom: 8px;
            border-radius: 5px;
            color: white;
            font-weight: bold;
        }

        .grade-input-group {
            display: flex;
            gap: 8px;
            margin-bottom: 15px;
        }

        .grade-input-group input {
            flex: 1;
            padding: 10px;
            border: 2px solid #ddd;
            border-radius: 5px;
            font-size: 0.95em;
        }

        .grade-input-group input:focus {
            outline: none;
            border-color: #667eea;
        }

        .grade-input-group .btn {
            padding: 10px 15px;
            font-size: 0.9em;
        }

        /* Grade Colors */
        .grade-A-plus {
            background: #27ae60;
        }

        .grade-A {
            background: #2ecc71;
        }

        .grade-B-plus {
            background: #3498db;
        }

        .grade-B {
            background: #5dade2;
        }

        .grade-C-plus {
            background: #f39c12;
        }

        .grade-C {
            background: #e67e22;
        }

        .grade-D {
            background: #e74c3c;
        }

        .grade-F {
            background: #c0392b;
        }

        .empty-message {
            text-align: center;
            color: #999;
            padding: 40px 20px;
            font-size: 1.1em;
        }

        .grade-legend {
            background: white;
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            margin-bottom: 30px;
        }

        .grade-legend h3 {
            color: #333;
            margin-bottom: 15px;
            font-size: 1.2em;
        }

        .legend-items {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 10px;
        }

        .legend-item {
            padding: 10px 15px;
            border-radius: 5px;
            color: white;
            font-weight: bold;
            text-align: center;
        }

        @media (max-width: 768px) {
            .header h1 {
                font-size: 1.8em;
            }

            .classes-grid {
                grid-template-columns: 1fr;
            }

            .input-group {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📚 My Gradebook</h1>
            <p>Track your classes and grades with color-coded feedback</p>
        </div>

        <div class="grade-legend">
            <h3>Grade Scale</h3>
            <div class="legend-items">
                <div class="legend-item grade-A-plus">A+ (95-100)</div>
                <div class="legend-item grade-A">A (90-94)</div>
                <div class="legend-item grade-B-plus">B+ (85-89)</div>
                <div class="legend-item grade-B">B (80-84)</div>
                <div class="legend-item grade-C-plus">C+ (75-79)</div>
                <div class="legend-item grade-C">C (70-74)</div>
                <div class="legend-item grade-D">D (60-69)</div>
                <div class="legend-item grade-F">F (Below 60)</div>
            </div>
        </div>

        <div class="add-class-section">
            <h2>Add a New Class</h2>
            <div class="input-group">
                <input 
                    type="text" 
                    id="classNameInput" 
                    placeholder="Enter class name (e.g., Math 101, Biology)"
                    @keyup.enter="addNewClass()"
                >
                <button class="btn btn-primary" onclick="addNewClass()">Add Class</button>
            </div>
        </div>

        <div class="classes-grid" id="classesContainer"></div>
    </div>

    <script>
        // Initialize with sample data or from localStorage
        let classes = JSON.parse(localStorage.getItem('gradebook')) || [];

        function saveToLocalStorage() {
            localStorage.setItem('gradebook', JSON.stringify(classes));
        }

        function getGradeInfo(score) {
            if (score >= 95) return { letter: 'A+', color: 'grade-A-plus' };
            if (score >= 90) return { letter: 'A', color: 'grade-A' };
            if (score >= 85) return { letter: 'B+', color: 'grade-B-plus' };
            if (score >= 80) return { letter: 'B', color: 'grade-B' };
            if (score >= 75) return { letter: 'C+', color: 'grade-C-plus' };
            if (score >= 70) return { letter: 'C', color: 'grade-C' };
            if (score >= 60) return { letter: 'D', color: 'grade-D' };
            return { letter: 'F', color: 'grade-F' };
        }

        function calculateAverage(classObj) {
            if (classObj.grades.length === 0) return 0;
            const sum = classObj.grades.reduce((a, b) => a + b, 0);
            return (sum / classObj.grades.length).toFixed(1);
        }

        function addNewClass() {
            const input = document.getElementById('classNameInput');
            const className = input.value.trim();

            if (!className) {
                alert('Please enter a class name');
                return;
            }

            const newClass = {
                id: Date.now(),
                name: className,
                grades: []
            };

            classes.push(newClass);
            saveToLocalStorage();
            input.value = '';
            renderClasses();
        }

        function addGrade(classId) {
            const gradeInput = document.getElementById(`gradeInput-${classId}`);
            const grade = parseFloat(gradeInput.value);

            if (isNaN(grade) || grade < 0 || grade > 100) {
                alert('Please enter a valid grade between 0 and 100');
                return;
            }

            const classObj = classes.find(c => c.id === classId);
            if (classObj) {
                classObj.grades.push(grade);
                saveToLocalStorage();
                gradeInput.value = '';
                renderClasses();
            }
        }

        function deleteGrade(classId, index) {
            const classObj = classes.find(c => c.id === classId);
            if (classObj) {
                classObj.grades.splice(index, 1);
                saveToLocalStorage();
                renderClasses();
            }
        }

        function deleteClass(classId) {
            if (confirm('Are you sure you want to delete this class?')) {
                classes = classes.filter(c => c.id !== classId);
                saveToLocalStorage();
                renderClasses();
            }
        }

        function renderClasses() {
            const container = document.getElementById('classesContainer');

            if (classes.length === 0) {
                container.innerHTML = '<div class="empty-message">No classes yet. Add one to get started!</div>';
                return;
            }

            container.innerHTML = classes.map(classObj => {
                const average = calculateAverage(classObj);
                const averageGradeInfo = getGradeInfo(average);

                return `
                    <div class="class-card">
                        <div class="class-header">
                            <span class="class-name">${classObj.name}</span>
                            <button class="btn btn-danger" onclick="deleteClass(${classObj.id})">Delete</button>
                        </div>

                        <div style="margin-bottom: 20px;">
                            ${average > 0 ? `
                                <div class="class-average ${averageGradeInfo.color}">
                                    Average: ${average}% (${averageGradeInfo.letter})
                                </div>
                            ` : '
                                <div style="text-align: center; color: #999; padding: 10px;">No grades yet</div>
                            `}
                        </div>

                        <div class="grade-input-group">
                            <input 
                                type="number" 
                                id="gradeInput-${classObj.id}"
                                placeholder="Enter grade (0-100)"
                                min="0"
                                max="100"
                                @keyup.enter="addGrade(${classObj.id})"
                            >
                            <button class="btn btn-primary" onclick="addGrade(${classObj.id})">Add Grade</button>
                        </div>

                        <div class="grades-list">
                            ${classObj.grades.length > 0 ? 
                                classObj.grades.map((grade, index) => {
                                    const gradeInfo = getGradeInfo(grade);
                                    return `
                                        <div class="grade-item ${gradeInfo.color}">
                                            <span>${grade}% (${gradeInfo.letter})</span>
                                            <button class="btn btn-danger" style="margin-left: 10px;" onclick="deleteGrade(${classObj.id}, ${index})">×</button>
                                        </div>
                                    `;
                                }).join('')
                            : '<div style="text-align: center; color: #999; padding: 20px;">No grades added yet</div>'
                            }
                        </div>
                    </div>
                `;
            }).join('');
        }

        // Allow Enter key for inputs
        document.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                if (e.target.id === 'classNameInput') {
                    addNewClass();
                } else if (e.target.id.startsWith('gradeInput-')) {
                    const classId = parseInt(e.target.id.split('-')[1]);
                    addGrade(classId);
                }
            }
        });

        // Initial render
        renderClasses();
    </script>
</body>
</html>
