<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gradebook</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }

        .wrapper {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }

        .hidden {
            display: none !important;
        }

        /* Auth Styles */
        .auth-container {
            background: white;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            max-width: 400px;
            width: 100%;
        }

        .auth-title {
            font-size: 2em;
            color: #333;
            margin-bottom: 30px;
            text-align: center;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            color: #333;
            margin-bottom: 8px;
            font-weight: bold;
        }

        .form-group input {
            width: 100%;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 5px;
            font-size: 1em;
        }

        .form-group input:focus {
            outline: none;
            border-color: #667eea;
        }

        .error {
            color: #ff6b6b;
            background: #ffe0de;
            padding: 10px;
            border-radius: 5px;
            margin-bottom: 15px;
            display: none;
        }

        .error.show {
            display: block;
        }

        .btn {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 1em;
            font-weight: bold;
            cursor: pointer;
        }

        .btn:hover {
            opacity: 0.9;
        }

        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .toggle-text {
            text-align: center;
            margin-top: 20px;
            color: #666;
        }

        .toggle-link {
            color: #667eea;
            cursor: pointer;
            font-weight: bold;
            text-decoration: underline;
        }

        .toggle-link:hover {
            color: #764ba2;
        }

        /* App Styles */
        .app-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: white;
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 2.5em;
            margin: 0;
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 15px;
            background: rgba(255, 255, 255, 0.1);
            padding: 12px 20px;
            border-radius: 5px;
        }

        .logout-btn {
            background: #ff6b6b;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
        }

        .logout-btn:hover {
            background: #ee5a52;
        }

        .grade-legend {
            background: white;
            padding: 25px;
            border-radius: 10px;
            margin-bottom: 30px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        }

        .grade-legend h3 {
            color: #333;
            margin-bottom: 15px;
        }

        .legend-items {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 10px;
        }

        .legend-item {
            padding: 10px;
            border-radius: 5px;
            color: white;
            font-weight: bold;
            text-align: center;
        }

        .grade-A-plus { background: #27ae60; }
        .grade-A { background: #2ecc71; }
        .grade-B-plus { background: #3498db; }
        .grade-B { background: #5dade2; }
        .grade-C-plus { background: #f39c12; }
        .grade-C { background: #e67e22; }
        .grade-D { background: #e74c3c; }
        .grade-F { background: #c0392b; }

        .add-class-section {
            background: white;
            padding: 30px;
            border-radius: 10px;
            margin-bottom: 30px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        }

        .input-group {
            display: flex;
            gap: 10px;
        }

        .input-group input {
            flex: 1;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 5px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
        }

        .btn-primary:hover {
            opacity: 0.9;
        }

        .classes-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 20px;
        }

        .class-card {
            background: white;
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        }

        .class-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 3px solid #667eea;
            padding-bottom: 15px;
            margin-bottom: 20px;
        }

        .class-name {
            font-size: 1.3em;
            font-weight: bold;
            color: #333;
        }

        .btn-delete {
            background: #ff6b6b;
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 5px;
            cursor: pointer;
        }

        .class-average {
            font-size: 1.1em;
            font-weight: bold;
            padding: 10px;
            border-radius: 5px;
            color: white;
            margin-bottom: 15px;
            text-align: center;
        }

        .grade-input-group {
            display: flex;
            gap: 8px;
            margin-bottom: 15px;
        }

        .grade-input-group input {
            flex: 1;
            padding: 10px;
            border: 2px solid #ddd;
            border-radius: 5px;
        }

        .grades-list {
            max-height: 300px;
            overflow-y: auto;
        }

        .grade-item {
            display: flex;
            justify-content: space-between;
            padding: 10px;
            margin-bottom: 8px;
            border-radius: 5px;
            color: white;
            font-weight: bold;
        }

        .empty-message {
            text-align: center;
            color: #999;
            padding: 40px;
        }
    </style>
</head>
<body>
    <!-- Auth Page -->
    <div id="authPage" class="wrapper">
        <div class="auth-container">
            <h2 class="auth-title" id="authTitle">Login</h2>
            <div id="authError" class="error"></div>
            
            <form id="authForm" onsubmit="handleAuth(event)">
                <div class="form-group">
                    <label>Username</label>
                    <input type="text" id="username" required>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="password" required>
                </div>
                <button type="submit" class="btn" id="authBtn">Login</button>
            </form>
            
            <div class="toggle-text">
                <span id="toggleText">Don't have an account? </span>
                <span class="toggle-link" id="toggleLink">Sign up here</span>
            </div>
        </div>
    </div>

    <!-- App Page -->
    <div id="appPage" class="hidden">
        <div class="app-container">
            <div class="header">
                <h1>📚 My Gradebook</h1>
                <div class="user-info">
                    <span id="username"></span>
                    <button class="logout-btn" onclick="logout()">Logout</button>
                </div>
            </div>

            <div class="grade-legend">
                <h3>Grade Scale</h3>
                <div class="legend-items">
                    <div class="legend-item grade-A-plus">A+ (95-100)</div>
                    <div class="legend-item grade-A">A (90-94)</div>
                    <div class="legend-item grade-B-plus">B+ (85-89)</div>
                    <div class="legend-item grade-B">B (80-84)</div>
                    <div class="legend-item grade-C-plus">C+ (75-79)</div>
                    <div class="legend-item grade-C">C (70-74)</div>
                    <div class="legend-item grade-D">D (60-69)</div>
                    <div class="legend-item grade-F">F (Below 60)</div>
                </div>
            </div>

            <div class="add-class-section">
                <h2>Add Class</h2>
                <div class="input-group">
                    <input type="text" id="className" placeholder="Enter class name">
                    <button class="btn-primary" onclick="addClass()">Add Class</button>
                </div>
            </div>

            <div class="classes-grid" id="classesContainer"></div>
        </div>
    </div>

    <script>
        const API_URL = '/api';
        let isSignupMode = false;

        // Initialize on page load
        window.addEventListener('DOMContentLoaded', () => {
            document.getElementById('toggleLink').addEventListener('click', toggleAuthMode);
            checkAuthStatus();
        });

        async function checkAuthStatus() {
            try {
                const response = await fetch(`${API_URL}/auth/user`, {
                    credentials: 'include'
                });
                const data = await response.json();
                
                if (data.user) {
                    showApp(data.user.username);
                } else {
                    showAuth();
                }
            } catch (error) {
                console.error('Auth check error:', error);
                showAuth();
            }
        }

        function toggleAuthMode() {
            isSignupMode = !isSignupMode;
            const title = document.getElementById('authTitle');
            const btn = document.getElementById('authBtn');
            const toggleText = document.getElementById('toggleText');

            if (isSignupMode) {
                title.textContent = 'Sign Up';
                btn.textContent = 'Create Account';
                toggleText.textContent = 'Already have an account? ';
            } else {
                title.textContent = 'Login';
                btn.textContent = 'Login';
                toggleText.textContent = "Don't have an account? ";
            }
        }

        async function handleAuth(event) {
            event.preventDefault();

            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const btn = document.getElementById('authBtn');
            const errorDiv = document.getElementById('authError');

            btn.disabled = true;
            errorDiv.classList.remove('show');

            try {
                const endpoint = isSignupMode ? '/api/auth/signup' : '/api/auth/login';
                const response = await fetch(endpoint, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password }),
                    credentials: 'include'
                });

                const data = await response.json();

                if (!response.ok) {
                    throw new Error(data.error || 'Auth failed');
                }

                showApp(data.username);
            } catch (error) {
                errorDiv.textContent = error.message;
                errorDiv.classList.add('show');
            } finally {
                btn.disabled = false;
            }
        }

        async function logout() {
            await fetch(`${API_URL}/auth/logout`, { 
                method: 'POST',
                credentials: 'include'
            });
            isSignupMode = false;
            document.getElementById('authForm').reset();
            document.getElementById('authTitle').textContent = 'Login';
            document.getElementById('authBtn').textContent = 'Login';
            showAuth();
        }

        function showAuth() {
            document.getElementById('authPage').classList.remove('hidden');
            document.getElementById('appPage').classList.add('hidden');
        }

        function showApp(username) {
            document.getElementById('authPage').classList.add('hidden');
            document.getElementById('appPage').classList.remove('hidden');
            document.getElementById('username').textContent = `Welcome, ${username}!`;
            loadClasses();
        }

        function getGradeInfo(score) {
            if (score >= 95) return { letter: 'A+', color: 'grade-A-plus' };
            if (score >= 90) return { letter: 'A', color: 'grade-A' };
            if (score >= 85) return { letter: 'B+', color: 'grade-B-plus' };
            if (score >= 80) return { letter: 'B', color: 'grade-B' };
            if (score >= 75) return { letter: 'C+', color: 'grade-C-plus' };
            if (score >= 70) return { letter: 'C', color: 'grade-C' };
            if (score >= 60) return { letter: 'D', color: 'grade-D' };
            return { letter: 'F', color: 'grade-F' };
        }

        async function addClass() {
            const name = document.getElementById('className').value.trim();
            if (!name) return alert('Enter a class name');

            try {
                const response = await fetch(`${API_URL}/classes`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name }),
                    credentials: 'include'
                });

                if (!response.ok) throw new Error('Failed to add class');

                document.getElementById('className').value = '';
                loadClasses();
            } catch (error) {
                alert(error.message);
            }
        }

        async function addGrade(classId) {
            const score = parseFloat(document.getElementById(`score-${classId}`).value);
            if (isNaN(score) || score < 0 || score > 100) return alert('Enter grade 0-100');

            try {
                const response = await fetch(`${API_URL}/classes/${classId}/grades`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ score }),
                    credentials: 'include'
                });

                if (!response.ok) throw new Error('Failed to add grade');

                document.getElementById(`score-${classId}`).value = '';
                loadClasses();
            } catch (error) {
                alert(error.message);
            }
        }

        async function deleteGrade(gradeId) {
            try {
                await fetch(`${API_URL}/grades/${gradeId}`, { 
                    method: 'DELETE',
                    credentials: 'include'
                });
                loadClasses();
            } catch (error) {
                alert(error.message);
            }
        }

        async function deleteClass(classId) {
            if (!confirm('Delete this class and all grades?')) return;

            try {
                await fetch(`${API_URL}/classes/${classId}`, { 
                    method: 'DELETE',
                    credentials: 'include'
                });
                loadClasses();
            } catch (error) {
                alert(error.message);
            }
        }

        async function loadClasses() {
            const container = document.getElementById('classesContainer');

            try {
                const response = await fetch(`${API_URL}/classes`, {
                    credentials: 'include'
                });
                const classes = await response.json();

                if (classes.length === 0) {
                    container.innerHTML = '<div class="empty-message">No classes yet. Add one to get started!</div>';
                    return;
                }

                container.innerHTML = classes.map(cls => {
                    const avg = getGradeInfo(cls.average);
                    return `
                        <div class="class-card">
                            <div class="class-header">
                                <span class="class-name">${cls.name}</span>
                                <button class="btn-delete" onclick="deleteClass(${cls.id})">Delete</button>
                            </div>
                            <div class="class-average ${avg.color}">
                                Average: ${cls.average}% (${avg.letter})
                            </div>
                            <div class="grade-input-group">
                                <input type="number" id="score-${cls.id}" placeholder="0-100" min="0" max="100">
                                <button class="btn-primary" onclick="addGrade(${cls.id})">Add</button>
                            </div>
                            <div class="grades-list" id="grades-${cls.id}">Loading...</div>
                        </div>
                    `;
                }).join('');

                // Load grades for each class
                for (let cls of classes) {
                    const gradesResp = await fetch(`${API_URL}/classes/${cls.id}/grades`, {
                        credentials: 'include'
                    });
                    const grades = await gradesResp.json();
                    const gradesDiv = document.getElementById(`grades-${cls.id}`);
                    
                    if (grades.length === 0) {
                        gradesDiv.innerHTML = '<div style="text-align: center; color: #999;">No grades yet</div>';
                    } else {
                        gradesDiv.innerHTML = grades.map(g => {
                            const info = getGradeInfo(g.score);
                            return `
                                <div class="grade-item ${info.color}">
                                    <span>${g.score}% (${info.letter})</span>
                                    <button class="btn-delete" style="padding: 2px 8px; font-size: 0.8em;" onclick="deleteGrade(${g.id})">×</button>
                                </div>
                            `;
                        }).join('');
                    }
                }
            } catch (error) {
                container.innerHTML = `<div class="empty-message">Error: ${error.message}</div>`;
            }
        }
    </script>
</body>
</html>
