<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gradebook</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        /* Login/Auth Styles */
        .auth-page {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .auth-page.active {
            display: flex;
        }

        .auth-container {
            background: white;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            max-width: 400px;
            width: 100%;
        }

        .auth-container h2 {
            color: #333;
            margin-bottom: 30px;
            text-align: center;
            font-size: 1.8em;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            color: #333;
            margin-bottom: 8px;
            font-weight: 500;
        }

        .form-group input {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #ddd;
            border-radius: 5px;
            font-size: 1em;
            transition: border-color 0.3s;
        }

        .form-group input:focus {
            outline: none;
            border-color: #667eea;
        }

        .auth-error {
            color: #ff6b6b;
            text-align: center;
            margin-bottom: 15px;
            font-size: 0.9em;
        }

        .btn-auth {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 1em;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .btn-auth:hover {
            transform: translateY(-2px);
        }

        .btn-auth:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .auth-toggle {
            text-align: center;
            margin-top: 20px;
            color: #666;
        }

        .auth-toggle a {
            color: #667eea;
            cursor: pointer;
            text-decoration: none;
            font-weight: bold;
        }

        .auth-toggle a:hover {
            text-decoration: underline;
        }

        /* Main App Styles */
        .app-page {
            display: none;
        }

        .app-page.active {
            display: block;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: white;
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 2.5em;
            margin: 0;
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 20px;
            background: rgba(255, 255, 255, 0.1);
            padding: 12px 20px;
            border-radius: 5px;
            backdrop-filter: blur(10px);
        }

        .user-info span {
            font-size: 1.1em;
        }

        .btn-logout {
            background: #ff6b6b;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.3s;
        }

        .btn-logout:hover {
            background: #ee5a52;
        }

        .add-class-section {
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            margin-bottom: 30px;
        }

        .add-class-section h2 {
            color: #333;
            margin-bottom: 20px;
            font-size: 1.5em;
        }

        .input-group {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .input-group input {
            flex: 1;
            padding: 12px 15px;
            border: 2px solid #ddd;
            border-radius: 5px;
            font-size: 1em;
            transition: border-color 0.3s;
        }

        .input-group input:focus {
            outline: none;
            border-color: #667eea;
        }

        .btn {
            padding: 12px 25px;
            border: none;
            border-radius: 5px;
            font-size: 1em;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: bold;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .btn-primary:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .btn-secondary {
            background: #f0f0f0;
            color: #333;
        }

        .btn-secondary:hover {
            background: #e0e0e0;
        }

        .btn-danger {
            background: #ff6b6b;
            color: white;
            padding: 8px 15px;
            font-size: 0.9em;
        }

        .btn-danger:hover {
            background: #ee5a52;
        }

        .classes-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 20px;
        }

        .class-card {
            background: white;
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        }

        .class-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            border-bottom: 3px solid #667eea;
            padding-bottom: 15px;
        }

        .class-name {
            font-size: 1.3em;
            font-weight: bold;
            color: #333;
        }

        .class-average {
            font-size: 1.2em;
            font-weight: bold;
            padding: 8px 15px;
            border-radius: 5px;
            color: white;
        }

        .grades-list {
            margin-bottom: 20px;
            max-height: 300px;
            overflow-y: auto;
        }

        .grade-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 15px;
            margin-bottom: 8px;
            border-radius: 5px;
            color: white;
            font-weight: bold;
        }

        .grade-input-group {
            display: flex;
            gap: 8px;
            margin-bottom: 15px;
        }

        .grade-input-group input {
            flex: 1;
            padding: 10px;
            border: 2px solid #ddd;
            border-radius: 5px;
            font-size: 0.95em;
        }

        .grade-input-group input:focus {
            outline: none;
            border-color: #667eea;
        }

        .grade-input-group .btn {
            padding: 10px 15px;
            font-size: 0.9em;
        }

        /* Grade Colors */
        .grade-A-plus {
            background: #27ae60;
        }

        .grade-A {
            background: #2ecc71;
        }

        .grade-B-plus {
            background: #3498db;
        }

        .grade-B {
            background: #5dade2;
        }

        .grade-C-plus {
            background: #f39c12;
        }

        .grade-C {
            background: #e67e22;
        }

        .grade-D {
            background: #e74c3c;
        }

        .grade-F {
            background: #c0392b;
        }

        .empty-message {
            text-align: center;
            color: #999;
            padding: 40px 20px;
            font-size: 1.1em;
        }

        .grade-legend {
            background: white;
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            margin-bottom: 30px;
        }

        .grade-legend h3 {
            color: #333;
            margin-bottom: 15px;
            font-size: 1.2em;
        }

        .legend-items {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 10px;
        }

        .legend-item {
            padding: 10px 15px;
            border-radius: 5px;
            color: white;
            font-weight: bold;
            text-align: center;
        }

        .loading {
            text-align: center;
            color: white;
            padding: 40px;
            font-size: 1.1em;
        }

        .error-message {
            background: #ff6b6b;
            color: white;
            padding: 15px;
            border-radius: 5px;
            margin-bottom: 20px;
            text-align: center;
        }

        @media (max-width: 768px) {
            .header {
                flex-direction: column;
                gap: 15px;
            }

            .header h1 {
                font-size: 1.8em;
            }

            .classes-grid {
                grid-template-columns: 1fr;
            }

            .input-group {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <!-- Login/Signup Page -->
    <div id="authPage" class="auth-page active">
        <div class="auth-container">
            <h2 id="authTitle">Login</h2>
            <div id="authError" class="auth-error" style="display: none;"></div>
            <form id="authForm" onsubmit="handleAuth(event)">
                <div class="form-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" name="username" required>
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" required>
                </div>
                <button type="submit" class="btn-auth" id="authBtn">Login</button>
            </form>
            <div class="auth-toggle">
                Don't have an account? <a onclick="toggleAuthMode()" id="authToggle">Sign up here</a>
            </div>
        </div>
    </div>

    <!-- Main App Page -->
    <div id="appPage" class="app-page">
        <div class="container">
            <div class="header">
                <h1>📚 My Gradebook</h1>
                <div class="user-info">
                    <span id="welcomeUser">Welcome!</span>
                    <button class="btn-logout" onclick="logout()">Logout</button>
                </div>
            </div>

            <div class="grade-legend">
                <h3>Grade Scale</h3>
                <div class="legend-items">
                    <div class="legend-item grade-A-plus">A+ (95-100)</div>
                    <div class="legend-item grade-A">A (90-94)</div>
                    <div class="legend-item grade-B-plus">B+ (85-89)</div>
                    <div class="legend-item grade-B">B (80-84)</div>
                    <div class="legend-item grade-C-plus">C+ (75-79)</div>
                    <div class="legend-item grade-C">C (70-74)</div>
                    <div class="legend-item grade-D">D (60-69)</div>
                    <div class="legend-item grade-F">F (Below 60)</div>
                </div>
            </div>

            <div class="add-class-section">
                <h2>Add a New Class</h2>
                <div id="errorMessage" class="error-message" style="display: none;"></div>
                <div class="input-group">
                    <input 
                        type="text" 
                        id="classNameInput" 
                        placeholder="Enter class name (e.g., Math 101, Biology)"
                    >
                    <button class="btn btn-primary" id="addClassBtn" onclick="addNewClass()">Add Class</button>
                </div>
            </div>

            <div class="classes-grid" id="classesContainer"></div>
        </div>
    </div>

    <script>
        const API_URL = '/api';
        let isSignupMode = false;

        // Check if user is logged in on page load
        window.addEventListener('DOMContentLoaded', async () => {
            await checkAuthStatus();
        });

        async function checkAuthStatus() {
            try {
                const response = await fetch(`${API_URL}/auth/user`);
                const data = await response.json();

                if (data.user) {
                    showAppPage(data.user.username);
                } else {
                    showAuthPage();
                }
            } catch (error) {
                console.error('Error checking auth status:', error);
                showAuthPage();
            }
        }

        function showAuthPage() {
            document.getElementById('authPage').classList.add('active');
            document.getElementById('appPage').classList.remove('active');
        }

        function showAppPage(username) {
            document.getElementById('authPage').classList.remove('active');
            document.getElementById('appPage').classList.add('active');
            document.getElementById('welcomeUser').textContent = `Welcome, ${username}!`;
            renderClasses();
        }

        function toggleAuthMode() {
            isSignupMode = !isSignupMode;
            const title = document.getElementById('authTitle');
            const btn = document.getElementById('authBtn');
            const toggle = document.getElementById('authToggle');

            if (isSignupMode) {
                title.textContent = 'Sign Up';
                btn.textContent = 'Create Account';
                toggle.textContent = 'Already have an account? Login here';
            } else {
                title.textContent = 'Login';
                btn.textContent = 'Login';
                toggle.textContent = "Don't have an account? Sign up here";
            }
            document.getElementById('authError').style.display = 'none';
            document.getElementById('authForm').reset();
        }

        async function handleAuth(event) {
            event.preventDefault();
            
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const btn = document.getElementById('authBtn');
            const errorDiv = document.getElementById('authError');

            btn.disabled = true;
            errorDiv.style.display = 'none';

            try {
                const endpoint = isSignupMode ? '/api/auth/signup' : '/api/auth/login';
                const response = await fetch(endpoint, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ username, password })
                });

                const data = await response.json();

                if (!response.ok) {
                    errorDiv.textContent = data.error || 'Authentication failed';
                    errorDiv.style.display = 'block';
                    return;
                }

                showAppPage(data.username);
            } catch (error) {
                errorDiv.textContent = 'Error: ' + error.message;
                errorDiv.style.display = 'block';
            } finally {
                btn.disabled = false;
            }
        }

        async function logout() {
            try {
                await fetch(`${API_URL}/auth/logout`, {
                    method: 'POST'
                });
                showAuthPage();
                document.getElementById('authForm').reset();
                isSignupMode = false;
                document.getElementById('authTitle').textContent = 'Login';
                document.getElementById('authBtn').textContent = 'Login';
            } catch (error) {
                console.error('Error logging out:', error);
            }
        }

        function showError(message) {
            const errorDiv = document.getElementById('errorMessage');
            errorDiv.textContent = message;
            errorDiv.style.display = 'block';
            setTimeout(() => {
                errorDiv.style.display = 'none';
            }, 3000);
        }

        function getGradeInfo(score) {
            if (score >= 95) return { letter: 'A+', color: 'grade-A-plus' };
            if (score >= 90) return { letter: 'A', color: 'grade-A' };
            if (score >= 85) return { letter: 'B+', color: 'grade-B-plus' };
            if (score >= 80) return { letter: 'B', color: 'grade-B' };
            if (score >= 75) return { letter: 'C+', color: 'grade-C-plus' };
            if (score >= 70) return { letter: 'C', color: 'grade-C' };
            if (score >= 60) return { letter: 'D', color: 'grade-D' };
            return { letter: 'F', color: 'grade-F' };
        }

        async function addNewClass() {
            const input = document.getElementById('classNameInput');
            const className = input.value.trim();
            const btn = document.getElementById('addClassBtn');

            if (!className) {
                showError('Please enter a class name');
                return;
            }

            btn.disabled = true;
            try {
                const response = await fetch(`${API_URL}/classes`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ name: className })
                });

                const data = await response.json();
                if (!response.ok) {
                    showError(data.error || 'Failed to add class');
                    return;
                }

                input.value = '';
                renderClasses();
            } catch (error) {
                showError('Error adding class: ' + error.message);
            } finally {
                btn.disabled = false;
            }
        }

        async function addGrade(classId) {
            const gradeInput = document.getElementById(`gradeInput-${classId}`);
            const grade = parseFloat(gradeInput.value);
            const btn = document.querySelector(`button[onclick="addGrade(${classId})"]`);

            if (isNaN(grade) || grade < 0 || grade > 100) {
                showError('Please enter a valid grade between 0 and 100');
                return;
            }

            btn.disabled = true;
            try {
                const response = await fetch(`${API_URL}/classes/${classId}/grades`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ score: grade })
                });

                const data = await response.json();
                if (!response.ok) {
                    showError(data.error || 'Failed to add grade');
                    return;
                }

                gradeInput.value = '';
                renderClasses();
            } catch (error) {
                showError('Error adding grade: ' + error.message);
            } finally {
                btn.disabled = false;
            }
        }

        async function deleteGrade(gradeId) {
            try {
                const response = await fetch(`${API_URL}/grades/${gradeId}`, {
                    method: 'DELETE'
                });

                if (!response.ok) {
                    showError('Failed to delete grade');
                    return;
                }

                renderClasses();
            } catch (error) {
                showError('Error deleting grade: ' + error.message);
            }
        }

        async function deleteClass(classId) {
            if (!confirm('Are you sure you want to delete this class and all its grades?')) {
                return;
            }

            try {
                const response = await fetch(`${API_URL}/classes/${classId}`, {
                    method: 'DELETE'
                });

                if (!response.ok) {
                    showError('Failed to delete class');
                    return;
                }

                renderClasses();
            } catch (error) {
                showError('Error deleting class: ' + error.message);
            }
        }

        async function renderClasses() {
            const container = document.getElementById('classesContainer');
            container.innerHTML = '<div class="loading">Loading classes...</div>';

            try {
                const response = await fetch(`${API_URL}/classes`);
                if (!response.ok) {
                    throw new Error('Failed to fetch classes');
                }
                const classes = await response.json();

                if (classes.length === 0) {
                    container.innerHTML = '<div class="empty-message">No classes yet. Add one to get started!</div>';
                    return;
                }

                // Fetch grades for each class
                const classesWithGrades = await Promise.all(
                    classes.map(async (classObj) => {
                        const gradesResponse = await fetch(`${API_URL}/classes/${classObj.id}/grades`);
                        const grades = await gradesResponse.json();
                        return { ...classObj, grades };
                    })
                );

                container.innerHTML = classesWithGrades.map(classObj => {
                    const average = classObj.average;
                    const averageGradeInfo = getGradeInfo(average);

                    return `
                        <div class="class-card">
                            <div class="class-header">
                                <span class="class-name">${classObj.name}</span>
                                <button class="btn btn-danger" onclick="deleteClass(${classObj.id})">Delete</button>
                            </div>

                            <div style="margin-bottom: 20px;">
                                ${average > 0 ? `
                                    <div class="class-average ${averageGradeInfo.color}">
                                        Average: ${average}% (${averageGradeInfo.letter})
                                    </div>
                                ` : '
                                    <div style="text-align: center; color: #999; padding: 10px;">No grades yet</div>
                                `}
                            </div>

                            <div class="grade-input-group">
                                <input 
                                    type="number" 
                                    id="gradeInput-${classObj.id}"
                                    placeholder="Enter grade (0-100)"
                                    min="0"
                                    max="100"
                                >
                                <button class="btn btn-primary" onclick="addGrade(${classObj.id})">Add Grade</button>
                            </div>

                            <div class="grades-list">
                                ${classObj.grades.length > 0 ? 
                                    classObj.grades.map((grade) => {
                                        const gradeInfo = getGradeInfo(grade.score);
                                        return `
                                            <div class="grade-item ${gradeInfo.color}">
                                                <span>${grade.score}% (${gradeInfo.letter})</span>
                                                <button class="btn btn-danger" onclick="deleteGrade(${grade.id})">×</button>
                                            </div>
                                        `;
                                    }).join('')
                                : '<div style="text-align: center; color: #999; padding: 20px;">No grades added yet</div>'
                                }
                            </div>
                        </div>
                    `;
                }).join('');
            } catch (error) {
                showError('Error loading classes: ' + error.message);
                container.innerHTML = '<div class="empty-message">Error loading data</div>';
            }
        }

        // Allow Enter key for inputs
        document.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                if (e.target.id === 'classNameInput') {
                    addNewClass();
                } else if (e.target.id.startsWith('gradeInput-')) {
                    const classId = parseInt(e.target.id.split('-')[1]);
                    addGrade(classId);
                } else if (e.target.id === 'username' || e.target.id === 'password') {
                    handleAuth(e);
                }
            }
        });
    </script>
</body>
</html>
